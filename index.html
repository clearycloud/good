<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♻️ 분리수거 도우미</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 포인트 버튼 -->
<div id="pointButton" onclick="openShop()">
🪙 <span id="pointDisplay">0</span>P
</div>

<!-- 지도 화면 -->
<div id="mapPage">

<h1>♻️ 분리수거 도우미</h1>
<p>지역을 선택하세요</p>

<div class="korea-map">

<button onclick="selectRegion('서울')" class="seoul">서울</button>
<button onclick="selectRegion('인천')" class="incheon">인천</button>
<button onclick="selectRegion('대전')" class="daejeon">대전</button>
<button onclick="selectRegion('광주')" class="gwangju">광주</button>
<button onclick="selectRegion('대구')" class="daegu">대구</button>
<button onclick="selectRegion('울산')" class="ulsan">울산</button>
<button onclick="selectRegion('부산')" class="busan">부산</button>
<button onclick="selectRegion('제주도')" class="jeju">제주도</button>

</div>

</div>

<!-- 검색 화면 -->
<div id="searchPage" style="display:none;">

<button class="backBtn" onclick="goBack()">
← 지도 보기
</button>

<h2 id="regionTitle"></h2>

<p>
검색 가능:
플라스틱, 캔, 음식물쓰레기,
페트병, 종이, 박스, 비닐 등
</p>

<input
type="text"
id="searchInput"
placeholder="예: 페트병, 종이, 비닐봉지"
>

<button onclick="searchItem()">
검색
</button>

<div id="result"></div>

</div>

<!-- 포인트 상점 -->
<div id="shopPage" style="display:none;">

<button class="backBtn" onclick="closeShop()">
← 돌아가기
</button>

<h2>🎁 포인트 상점</h2>

<div class="rewardCard">
<h3>에코백</h3>
<p>100P</p>
<button onclick="exchangeReward(100,'에코백')">교환</button>
</div>

<div class="rewardCard">
<h3>텀블러</h3>
<p>200P</p>
<button onclick="exchangeReward(200,'텀블러')">교환</button>
</div>

<div class="rewardCard">
<h3>장바구니</h3>
<p>300P</p>
<button onclick="exchangeReward(300,'장바구니')">교환</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
