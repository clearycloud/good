<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>분리수거 도우미</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>♻️ 분리수거 도우미</h1>
  <p>지역을 선택하세요</p>

  <div class="map-container">

    <img src="korea-map.png" class="map">

    <button class="region seoul" onclick="showRegion('서울')">서울</button>
    <button class="region incheon" onclick="showRegion('인천')">인천</button>
    <button class="region daejeon" onclick="showRegion('대전')">대전</button>
    <button class="region daegu" onclick="showRegion('대구')">대구</button>
    <button class="region gwangju" onclick="showRegion('광주')">광주</button>
    <button class="region ulsan" onclick="showRegion('울산')">울산</button>
    <button class="region busan" onclick="showRegion('부산')">부산</button>
    <button class="region jeju" onclick="showRegion('제주도')">제주도</button>

  </div>

  <div class="card">

    <h2 id="selectedRegion">지역을 선택하세요</h2>

    <input
      type="text"
      id="searchInput"
      placeholder="페트병, 캔, 비닐류..."
    >

    <button onclick="searchItem()">검색</button>

    <div id="result"></div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
