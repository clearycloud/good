<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분리수거 도우미</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 지도 화면 -->
<div id="mapPage">

<h1>♻️ 분리수거 도우미</h1>
<p>지역을 선택하세요</p>

<div class="korea-map">

<button onclick="selectRegion('서울')" class="seoul">서울</button>
<button onclick="selectRegion('인천')" class="incheon">인천</button>
<button onclick="selectRegion('대전')" class="daejeon">대전</button>
<button onclick="selectRegion('광주')" class="gwangju">광주</button>
<button onclick="selectRegion('대구')" class="daegu">대구</button>
<button onclick="selectRegion('울산')" class="ulsan">울산</button>
<button onclick="selectRegion('부산')" class="busan">부산</button>
<button onclick="selectRegion('제주도')" class="jeju">제주도</button>

</div>

</div>

<!-- 검색 화면 -->
<div id="searchPage" style="display:none;">

<button class="backBtn" onclick="goBack()">
← 지도 보기
</button>

<h2 id="regionTitle"></h2>

<input
type="text"
id="searchInput"
placeholder="페트병, 캔, 비닐류..."
>

<button onclick="searchItem()">검색</button>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
